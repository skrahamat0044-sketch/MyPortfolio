<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Application Form</title>
    <link rel="stylesheet" href="./CSS/style.css">
</head>
<body>
    <div class="container">
        <div class="apply-box">
            <H1>Job Application<span class="title-small">(web)</span></H1>

            <form action="">
                <div class="form-container">

                    <div class="form-controler">
                        <label for="first-name">First Name</label>
                        <input id="first-name" name="first-name" placeholder=" Enter First Name..."/>
                    </div>

                    <div class="form-controler">
                        <label for="last-name">Last Name</label>
                        <input id="last-name" name="last-name" placeholder=" Enter Last Name..."/>
                    </div>

                    <div class="form-controler">
                        <label for="email">Last Name</label>
                        <input type="email" id="email" name="email" placeholder=" Enter Email..."/>
                    </div>

                     <div class="form-controler">
                        <label for="job-role">Job Role</label>
                        <select id="job-role" name="job-role">
                            <option value="">Select Job Role</option>
                            <option value="frontend">Frontend Developer</option>
                            <option value="backend">Backend Developer</option>
                            <option value="full-stack">Full Stack Developer</option>
                            <option value="ui-ux">UI UX Designer</option>
                        </select>
                    </div>

                    <div class="textarea-controler">
                        <label for="address">Address</label>
                        <textarea name="address" id="address" row="4" cols="50" placeholder="Enter Address"></textarea>
                    </div>

                     <div class="form-controler">
                        <label for="city">City</label>
                        <input id="city" name="city" placeholder=" Enter City Name..."/>
                    </div>

                    <div class="form-controler">
                        <label for="pincode">Pincode</label>
                        <input type="number" id="pincode" name="pincode" placeholder=" Enter Pinecode..."/>
                    </div>

                    <div class="form-controler">
                        <label for="date">Date</label>
                        <input type="date" id="date" name="date" />
                    </div>

                    <div class="form-controler">
                        <label for="upload">Upload Your CV</label>
                        <input type="file" id="upload" name="upload" />
                    </div>
                </div>

                <div class="button-container">
                    <button type="submit">Apply Now</button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
